[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = [
    "E", # code style (indentation, whitepspace, linebreaks, etc.)
    "F", # correctness (undefined names, unused imports, etc.)
    "I", # import sorting (alphabetical, type, first-party/third-party, etc.)
    "B", # bugbear (potential bugs, e.g., bare except, etc.)
    "UP", # update style (suggest newer syntax for target-version)
    "SIM", # simplify (complex expressions, nested statements, etc.)
    "EM", # exceptions (messsage style, etc.)
    "PIE", # quality of life rules

]
fixable = ["ALL"] # what is ruff allowed to auto-fix
ignore = ["EM101", "EM102", "E501", "F401"]

[tool.ruff.lint.isort]
known-first-party = ["stillib-parallelism", "stillib-random", "stillib-propagation", "stillib-plotting"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
testpaths = ["tests", "libs"]
addopts = "-ra"

[tool.mypy]
python_version = "3.12"
strict = false

